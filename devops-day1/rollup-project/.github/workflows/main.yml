name: Rollup CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    # We set the working directory to backend since the Node.js project lives there
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        # Fails the build automatically if dependencies fail to install
        run: npm ci

      - name: Lint Code
        # Runs the lint script if it exists in package.json
        run: npm run lint --if-present

      - name: Run Tests
        # Runs tests. Will fail the action if tests fail.
        run: npm run test --if-present
        env:
          # Mock environment variables for testing
          PORT: 3000
          BLOCK_SIZE: 5
          PROCESS_INTERVAL: 5000
          DATABASE_URL: "postgres://postgres:password@localhost:5432/rollup"
          REDIS_URL: "redis://localhost:6379"
          # Securely inject secrets from GitHub Settings -> Secrets
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
          ETH_PRIVATE_KEY: ${{ secrets.ETH_PRIVATE_KEY }}
          ROLLUP_CONTRACT_ADDRESS: ${{ secrets.ROLLUP_CONTRACT_ADDRESS }}

  build-and-push:
    name: Build & Push Docker Image
    needs: test-and-lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # OPTIONAL: Push to Docker Hub
      # This step only runs if you have added DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to your GitHub repository secrets.
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          # Only push to registry if secrets are present AND we are on the main branch
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || 'local-build' }}/rollup-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME || 'local-build' }}/rollup-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
